name: CI/CD — Finanzas Personales API

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # ── JOB 1: Build y Tests ────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Compilar y ejecutar tests
        run: mvn clean verify -B
        env:
          # Tests usan H2 en memoria — no necesitan Supabase
          SPRING_PROFILES_ACTIVE: h2
          JWT_SECRET: test-secret-key-para-ci-256bits-no-usar-en-produccion

      - name: Publicar resultados de tests
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Resultados JUnit
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Subir reporte de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: target/surefire-reports/
          retention-days: 7

  # ── JOB 2: Análisis de seguridad de dependencias ───────────────────────
  security-scan:
    name: Análisis de vulnerabilidades
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DfailBuildOnCVSS=9 \
            -DsuppressionFile=owasp-suppressions.xml \
            --fail-at-end || true
        continue-on-error: true

      - name: Subir reporte OWASP
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: owasp-report
          path: target/dependency-check-report.html
          retention-days: 14

  # ── JOB 3: Build Docker ────────────────────────────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build imagen Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: finanzas-personales-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── JOB 4: Deploy a Render ─────────────────────────────────────────────
  deploy:
    name: Deploy a Render
    runs-on: ubuntu-latest
    needs: [ build-and-test, docker-build ]
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Trigger deploy en Render
        run: |
          curl -s -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -H "Content-Type: application/json" \
            --fail
          echo "Deploy disparado exitosamente en Render"