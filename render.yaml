services:
  - type: web
    name: personal-finance-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finanzas-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: SPRING_PROFILES_ACTIVE
        value: prod

databases:
  - name: finanzas-db
    databaseName: finanzas_db
    user: finanzas_user
    plan: free
